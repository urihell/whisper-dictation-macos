name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      # The project weak-links FoundationModels (macOS 26 SDK), so build with
      # the newest Xcode on the runner rather than the image default.
      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -n 1)/Contents/Developer"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # CODE_SIGNING_ALLOWED=NO: the app target pins a local self-signed
      # identity ("WhisperDictation Dev") that doesn't exist on CI runners.
      - name: Build app
        run: >
          xcodebuild build
          -project WhisperDictation.xcodeproj
          -scheme WhisperDictation
          -destination platform=macOS
          CODE_SIGNING_ALLOWED=NO

      - name: Run tests
        run: >
          xcodebuild test
          -project WhisperDictation.xcodeproj
          -scheme WhisperDictation
          -destination platform=macOS
          CODE_SIGNING_ALLOWED=NO

  # On version tags: build the drag-to-install DMG and attach it to the GitHub
  # release. If the release doesn't exist yet, a draft is created — write the
  # notes there and publish. Cutting a version is then just pushing a tag.
  release-dmg:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -n 1)/Contents/Developer"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build DMG
        run: ./scripts/build-dmg.sh

      - name: Attach DMG to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" --draft --title "$tag" --generate-notes
          fi
          gh release upload "$tag" dist/WhisperDictation.dmg --repo "$GITHUB_REPOSITORY" --clobber
