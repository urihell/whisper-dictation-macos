name: WhisperDictation
options:
  bundleIdPrefix: com.udabby
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  LaunchAtLogin:
    url: https://github.com/sindresorhus/LaunchAtLogin-Modern
    from: "1.0.0"

targets:
  WhisperDictation:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - WhisperDictation
    dependencies:
      - package: WhisperKit
        product: WhisperKit
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
      - package: LaunchAtLogin
        product: LaunchAtLogin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.udabby.WhisperDictation
        PRODUCT_NAME: WhisperDictation
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.7.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        INFOPLIST_FILE: WhisperDictation/Support/Info.plist
        CODE_SIGN_ENTITLEMENTS: WhisperDictation/Support/WhisperDictation.entitlements
        # Stable self-signed identity so the Accessibility (TCC) grant persists
        # across rebuilds. Create it in Keychain Access (Certificate Assistant →
        # Code Signing, name "WhisperDictation Dev").
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "WhisperDictation Dev"
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        # Xcode "recommended settings" — bake in here so XcodeGen regeneration
        # keeps them (the .xcodeproj is generated + git-ignored).
        DEAD_CODE_STRIPPING: YES
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        # FoundationModels (on-device LLM) is macOS 26+; weak-link so the app
        # still launches on the macOS 14 deployment target. Usage is #available-gated.
        OTHER_LDFLAGS: "$(inherited) -weak_framework FoundationModels"
